<script>
(function() {
  'use strict';

  const DATA_URL = 'https://hrn-c6xc.github.io/ai-chat/data.json';

  if (document.readyState === "loading") document.addEventListener('DOMContentLoaded', init); else init();
  
  function init() {
    if (!document.body) document.body = document.createElement('body');
    const head = document.head;
    
    // Dependencies (Using Prism 'Coy' theme for clean white code backgrounds)
    const links = [
      { rel: 'stylesheet', href: 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap' },
      { rel: 'stylesheet', href: 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css' } 
    ];
    links.forEach(l => { if (!document.querySelector(`link[href="${l.href}"]`)) { const link = document.createElement('link'); Object.assign(link, l); head.appendChild(link); }});
    
    const scripts = [
      'https://unpkg.com/lucide@latest',
      'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js',
      'https://cdn.jsdelivr.net/npm/marked/marked.min.js'
    ];
    
    async function loadScripts() { 
      for (const src of scripts) { 
        if (!document.querySelector(`script[src="${src}"]`)) { 
          await new Promise((resolve) => { 
            const s = document.createElement('script'); 
            s.src = src; 
            s.async = false; 
            s.onload = resolve; 
            head.appendChild(s); 
          }); 
        } 
      } 
    }

    // STYLES (Correct Colors: Light Code Theme + Fresh UI)
    const style = document.createElement('style');
    style.textContent = `
      :root {
        --sidebar-width: 280px;
        --sidebar-bg: #f8fafc;
        --main-bg: #ffffff;
        --border-color: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --accent-blue: #2563eb;
        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        
        /* Code Colors (VS Code Light Style) */
        --code-bg: #ffffff;
        --code-header-bg: #f8fafc;
        --code-border: #e2e8f0;
        --code-text: #1e293b;
        
        --z-navbar: 1000;
        --z-sidebar: 1010;
        --z-overlay: 1005;
        --skeleton-bg: #e2e8f0;
        --skeleton-shine: #f1f5f9;
      }
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      
      /* Dynamic Viewport Height */
      @supports (height: 100dvh) {
        body, #sidebar, #sidebar-overlay, main { height: 100dvh; }
      }
      @supports not (height: 100dvh) {
        body, #sidebar, #sidebar-overlay, main { height: 100vh; }
      }

      body { margin: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; overflow: hidden; }
      
      /* NAVBAR */
      #navbar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #fff; border-bottom: 1px solid var(--border-color); align-items: center; padding: 0 20px; z-index: var(--z-navbar); }
      #burger-btn { background: none; border: none; cursor: pointer; color: var(--text-main); padding: 4px; display: flex; align-items: center; }
      
      /* SIDEBAR */
      #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; z-index: var(--z-sidebar); flex-shrink: 0; transition: transform var(--transition); position: relative; }
      .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 16px; padding-bottom: 40px; }
      #sidebar-close { display: none; position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; z-index: 10; }
      .search-container { position: relative; margin: 0 16px 32px; display: flex; align-items: center; }
      #search-trigger-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: #fff; font-size: 14px; outline: none; cursor: pointer; font-family: inherit; }
      .search-shortcut { position: absolute; right: 10px; font-size: 10px; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #94a3b8; border: 1px solid var(--border-color); pointer-events: none; }
      
      /* NAV ITEMS */
      .nav-group { margin-bottom: 16px; }
      .nav-group-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; border-radius: 6px; user-select: none; }
      .nav-group-header:hover { background: #f1f5f9; }
      .nav-group-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
      .nav-group-toggle-icon { width: 16px; height: 16px; color: var(--text-muted); transition: transform 0.2s ease; }
      .nav-group.collapsed .nav-group-toggle-icon { transform: rotate(-90deg); }
      .nav-group-items { overflow: hidden; transition: max-height 0.3s ease; padding-left: 4px; }
      .nav-group.collapsed .nav-group-items { max-height: 0 !important; }
      .nav-item { display: flex; align-items: center; padding: 10px 12px; font-size: 14px; color: var(--text-muted); cursor: pointer; border-radius: 6px; transition: .15s; margin-bottom: 4px; text-decoration: none; }
      .nav-item:hover { background: #f1f5f9; color: var(--text-main); }
      .nav-item.active { background: #fff; color: var(--accent-blue); box-shadow: 0 1px 3px rgba(0,0,0,.05); font-weight: 500; }
      .nav-icon { margin-right: 12px; width: 16px; height: 16px; opacity: .6; }
      .nested-container { margin-left: 18px; border-left: 1px solid var(--border-color); padding-left: 4px; margin-top: 4px; }

      /* MAIN CONTENT */
      main { flex: 1; overflow-y: auto; padding: 56px 0 0 0; display: flex; flex-direction: column; align-items: center; }
      .content-inner { width: 100%; max-width: 820px; padding: 0 48px 40px 48px; } 
      
      /* TYPOGRAPHY */
      .badge { background: #eff6ff; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--accent-blue); border: 1px solid #dbeafe; display: inline-block; margin-bottom: 20px; }
      h1, h2, h3, h4 { margin-top: 40px; margin-bottom: 20px; font-weight: 700; letter-spacing: -.02em; line-height: 1.3; color: var(--text-main); }
      h1 { font-size: 34px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-top: 0; }
      h2 { font-size: 26px; margin-top: 64px; border-top: 1px solid var(--border-color); padding-top: 32px; }
      h3 { font-size: 20px; margin-top: 40px; }
      p { line-height: 1.75; color: #475569; font-size: 15px; margin-bottom: 24px; }
      a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
      a:hover { text-decoration: underline; }
      ul, ol { padding-left: 28px; margin-bottom: 24px; color: #475569; }
      li { margin-bottom: 10px; line-height: 1.7; }
      
      /* Blockquote */
      blockquote {
        border-left: 3px solid var(--accent-blue);
        margin: 32px 0;
        padding: 16px 24px;
        background: #f8fafc;
        color: #475569;
        border-radius: 0 6px 6px 0;
        font-size: 14px;
      }
      blockquote p { margin-bottom: 0; line-height: 1.6; font-size: 14px; }

      hr { border: 0; height: 1px; background: var(--border-color); margin: 4em 0; }
      
      /* Tables */
      table { width: 100%; border-collapse: collapse; margin: 32px 0; font-size: 14px; display: block; overflow-x: auto; white-space: nowrap; }
      th, td { border: 1px solid var(--border-color); padding: 14px 18px; text-align: left; }
      th { background: #f8fafc; font-weight: 600; }
      tr:nth-child(even) { background: #f8fafc; }

      /* SEARCH */
      #search-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); display: none; justify-content: center; align-items: flex-start; padding-top: 15vh; z-index: 2000; backdrop-filter: blur(4px); }
      #search-overlay.active { display: flex; }
      .search-modal { width: 90%; max-width: 560px; background: #fff; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,.25); overflow: hidden; display: flex; flex-direction: column; max-height: 60vh; }
      .search-modal-header { padding: 18px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
      #search-input-real { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; background: transparent; }
      #search-results { overflow-y: auto; flex: 1; padding: 10px; min-height: 0; }
      .search-result-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 6px; font-size: 14px; color: var(--text-main); }
      .search-result-item:hover { background: #f1f5f9; color: var(--accent-blue); }

      /* CODE BLOCKS (LIGHT THEME) */
      .code-section { 
        margin: 36px 0; 
        background: var(--code-bg); 
        border-radius: 8px; 
        border: 1px solid var(--code-border);
        overflow: hidden; 
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
      }
      .code-header { 
        background: var(--code-header-bg); 
        padding: 0 18px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        height: 48px; 
        border-bottom: 1px solid var(--code-border);
      }
      .code-tab { font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
      .code-tab.active { color: var(--accent-blue); background: #eff6ff; }
      .copy-button { background: none; border: none; width: 32px; height: 32px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; justify-content: center; outline: none; transition: color 0.2s; border-radius: 4px; }
      .copy-button:hover { color: var(--text-main); background: #f1f5f9; }
      
      /* Prism Overrides for Light Theme */
      pre { 
        margin: 0 !important; 
        padding: 20px !important; 
        font-size: 13.5px !important; 
        overflow-x: auto; 
        background: transparent !important; 
        font-family: 'JetBrains Mono', monospace; 
        color: var(--code-text);
      }
      pre code { 
        font-family: inherit; 
        background: transparent; 
        padding: 0; 
        font-size: inherit; 
        border-radius: 0; 
        text-shadow: none;
        color: var(--code-text);
      }
      /* Syntax Colors (Standard Light) */
      .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #64748b; }
      .token.punctuation { color: #64748b; }
      .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol, .token.deleted { color: #dc2626; } /* Red */
      .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin, .token.inserted { color: #16a34a; } /* Green */
      .token.operator, .token.entity, .token.url, .language-css .token.string, .style .token.string { color: #0f172a; }
      .token.atrule, .token.attr-value, .token.keyword { color: #2563eb; } /* Blue */
      .token.function, .token.class-name { color: #7c3aed; } /* Purple */
      .token.regex, .token.important, .token.variable { color: #ea580c; } /* Orange */

      /* SKELETONS */
      .skeleton { background: var(--skeleton-bg); position: relative; overflow: hidden; border-radius: 4px; min-height: 1em; min-width: 3em; }
      .skeleton::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0; transform: translateX(-100%); background: linear-gradient(90deg,transparent,var(--skeleton-shine),transparent); animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 100% { transform: translateX(100%) } }
      .sk-nav-item { height: 28px; margin-bottom: 10px; }
      .sk-badge { height: 20px; width: 50px; margin-bottom: 20px; border-radius: 6px; }
      .sk-h1 { height: 38px; width: 40%; margin-bottom: 28px; }
      .sk-p { height: 16px; width: 100%; margin-bottom: 20px; }
      .sk-p-last { height: 16px; width: 70%; margin-bottom: 20px; }
      .sk-code { height: 180px; width: 100%; margin-top: 36px; border-radius: 8px; }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        #navbar { display: flex; }
        #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: none; border-right: none; }
        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 25px -5px rgba(0,0,0,.1); }
        #sidebar-close { display: flex; }
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: var(--z-overlay); }
        #sidebar-overlay.active { display: block; }
        main { padding-top: 80px; }
        .content-inner { padding: 0 24px 250px 24px; }
        .search-shortcut { display: none; }
        h1 { font-size: 28px; }
        h2 { font-size: 22px; }
        .code-section { border-radius: 6px; }
      }
    `;
    head.appendChild(style);

    // HTML
    document.body.innerHTML = `
      <div id="sidebar-overlay"></div>
      <nav id="navbar"><button id="burger-btn"><i data-lucide="menu" size="22"></i></button></nav>
      <aside id="sidebar">
        <button id="sidebar-close"><i data-lucide="x" size="18"></i></button>
        <div class="search-container" id="search-trigger">
          <input type="text" id="search-trigger-input" placeholder="Search Documentation..." readonly>
          <span class="search-shortcut">Ctrl K</span>
        </div>
        <div class="sidebar-scroll" id="dynamic-nav"></div>
      </aside>
      <div id="search-overlay">
        <div class="search-modal">
          <div class="search-modal-header"><i data-lucide="search" size="18"></i><input type="text" id="search-input-real" placeholder="Type to search..."></div>
          <div id="search-results"></div>
        </div>
      </div>
      <main><div class="content-inner" id="dynamic-content"></div></main>
    `;

    // LOGIC
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const navContainer = document.getElementById('dynamic-nav');
    const contentContainer = document.getElementById('dynamic-content');
    let docsData = { groups: [] };

    function renderSkeletons() {
      let navHtml = '';
      for(let i=0; i<4; i++) {
        navHtml += `<div style="padding:12px"><div class="skeleton" style="height:10px;width:30%;margin-bottom:16px"></div>`;
        for(let j=0; j<3; j++) navHtml += `<div class="skeleton sk-nav-item" style="width:${75 + Math.random()*20}%"></div>`;
        navHtml += `</div>`;
      }
      navContainer.innerHTML = navHtml;
      contentContainer.innerHTML = `<div class="skeleton sk-badge"></div><div class="skeleton sk-h1"></div><div class="skeleton sk-p"></div><div class="skeleton sk-p"></div><div class="skeleton sk-p-last"></div><div class="skeleton sk-code"></div>`;
    }

    const toggleSidebar = (open) => { sidebar.classList.toggle('open', open); overlay.classList.toggle('active', open); };
    const setActive = (id) => { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); const el=document.getElementById(`nav-${id}`); if(el) el.classList.add('active'); };
    const parseMarkdown = (text) => text ? marked.parse(text) : '';
    
    function processCodeBlocks(container) {
      container.querySelectorAll('pre').forEach((pre) => {
        if (pre.parentElement.classList.contains('code-section')) return;
        const codeEl = pre.querySelector('code');
        const langClass = codeEl ? Array.from(codeEl.classList).find(c => c.startsWith('language-')) : '';
        const lang = langClass ? langClass.replace('language-', '') : 'code';
        const wrapper = document.createElement('div'); wrapper.className = 'code-section';
        const header = document.createElement('div'); header.className = 'code-header';
        const tabContainer = document.createElement('div'); tabContainer.style.display = 'flex'; tabContainer.style.gap = '8px';
        const tab = document.createElement('span'); tab.className = 'code-tab active'; tab.textContent = lang.toUpperCase();
        tabContainer.appendChild(tab);
        const copyBtn = document.createElement('button'); copyBtn.className = 'copy-button'; copyBtn.innerHTML = '<i data-lucide="copy" size="14"></i>';
        header.appendChild(tabContainer); header.appendChild(copyBtn);
        const body = document.createElement('div'); body.className = 'code-body';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(header); body.appendChild(pre); wrapper.appendChild(body);
        copyBtn.onclick = async () => {
          const text = codeEl ? codeEl.textContent : pre.textContent;
          await navigator.clipboard.writeText(text);
          copyBtn.innerHTML = '<i data-lucide="check" style="color:#16a34a" size="14"></i>';
          lucide.createIcons();
          setTimeout(() => { copyBtn.innerHTML = '<i data-lucide="copy" size="14"></i>'; lucide.createIcons(); }, 2000);
        };
      });
    }

    function showPage(item) {
      if (!item || !item.content) return;
      const rawHtml = `<span class="badge">${item.badge || 'Docs'}</span>${parseMarkdown(item.content)}`;
      contentContainer.innerHTML = rawHtml;
      processCodeBlocks(contentContainer);
      Prism.highlightAll();
      lucide.createIcons();
      document.querySelector('main').scrollTop = 0;
      if (window.innerWidth <= 768) toggleSidebar(false);
    }

    function createNavItem(item, container) {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.id = `nav-${item.id}`;
      el.innerHTML = `<i data-lucide="${item.icon || 'file-text'}" class="nav-icon"></i><span>${item.label}</span>`;
      el.onclick = (e) => { e.stopPropagation(); if (item.content) { setActive(item.id); showPage(item); } };
      container.appendChild(el);
      if (item.children) {
        const childGroup = document.createElement('div'); childGroup.className = 'nested-container';
        item.children.forEach(child => createNavItem(child, childGroup));
        container.appendChild(childGroup);
      }
    }

    function renderSidebar() {
      navContainer.innerHTML = '';
      docsData.groups.forEach(g => {
        const groupDiv = document.createElement('div'); groupDiv.className = 'nav-group';
        const header = document.createElement('div'); header.className = 'nav-group-header';
        header.innerHTML = `<span class="nav-group-title">${g.title}</span><i data-lucide="chevron-down" class="nav-group-toggle-icon"></i>`;
        const itemsDiv = document.createElement('div'); itemsDiv.className = 'nav-group-items';
        g.items.forEach(i => createNavItem(i, itemsDiv));
        header.onclick = () => {
          const isCollapsed = groupDiv.classList.contains('collapsed');
          if (isCollapsed) { groupDiv.classList.remove('collapsed'); itemsDiv.style.maxHeight = itemsDiv.scrollHeight + 'px'; }
          else { groupDiv.classList.add('collapsed'); itemsDiv.style.maxHeight = '0px'; }
        };
        groupDiv.appendChild(header);
        groupDiv.appendChild(itemsDiv);
        navContainer.appendChild(groupDiv);
      });
      lucide.createIcons();
    }

    function flattenItems(items) {
      return items.reduce((acc, item) => {
        acc.push(item);
        if (item.children) acc.push(...flattenItems(item.children));
        return acc;
      }, []);
    }

    function renderSearchResults(query = "") {
      const resultsContainer = document.getElementById('search-results');
      resultsContainer.innerHTML = '';
      const allItems = flattenItems(docsData.groups.flatMap(g => g.items)).filter(i => i.content);
      const filtered = query ? allItems.filter(i => i.label.toLowerCase().includes(query.toLowerCase()) || i.content.toLowerCase().includes(query.toLowerCase())) : allItems;
      if(filtered.length === 0 && query) { resultsContainer.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">No results found</div>'; return; }
      filtered.slice(0, 8).forEach(i => {
        const div = document.createElement('div'); div.className = 'search-result-item';
        div.innerHTML = `<i data-lucide="${i.icon || 'file'}" size="16"></i><span>${i.label}</span>`;
        div.onclick = () => { showPage(i); setActive(i.id); document.getElementById('search-overlay').classList.remove('active'); };
        resultsContainer.appendChild(div);
      });
      lucide.createIcons();
    }

    async function start() {
      await loadScripts();
      renderSkeletons();
      lucide.createIcons();

      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error('Network error');
        docsData = await response.json();
      } catch (error) {
        console.error("Load error:", error);
        contentContainer.innerHTML = "<h1>Error</h1><p>Could not load data.</p>";
        return;
      }

      renderSidebar();
      
      document.getElementById('burger-btn').onclick = () => toggleSidebar(true);
      document.getElementById('sidebar-close').onclick = () => toggleSidebar(false);
      overlay.onclick = () => toggleSidebar(false);

      const sOverlay = document.getElementById('search-overlay');
      const input = document.getElementById('search-input-real');
      const openSearch = () => { sOverlay.classList.add('active'); input.focus(); renderSearchResults(input.value); };
      document.getElementById('search-trigger').onclick = openSearch;

      sOverlay.onclick = (e) => { if (e.target === sOverlay) sOverlay.classList.remove('active'); };
      input.oninput = (e) => renderSearchResults(e.target.value);
      window.onkeydown = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
        if (e.key === 'Escape') { sOverlay.classList.remove('active'); toggleSidebar(false); }
      };

      setTimeout(() => {
        document.querySelectorAll('.nav-group-items').forEach(el => { el.style.maxHeight = el.scrollHeight + 'px'; });
      }, 50);

      const first = flattenItems(docsData.groups[0]?.items || []).find(i => i.content);
      if (first) { showPage(first); setActive(first.id); }
    }

    start();
  }
})();
</script>
