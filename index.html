                  <strong>Write Code</strong>
                  <span>"Python password generator"</span>
               </div>
               <div class="suggestion-card" onclick="startSuggestion('Give me 5 tips to be more productive working from home')">
                  <strong>Ask Advice</strong>
                  <span>"Tips for working from home"</span>
               </div>
               <div class="suggestion-card" onclick="startSuggestion('Invent a creative story about a robot in nature')">

                  <rect x="6" y="6" width="12" height="12" rx="1"/>

const DB_NAME = "HyperRushDB";
const DB_STORE = "chatHistory";
let db;

function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = (e) => reject("IndexedDB error: " + e.target.error);
        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(DB_STORE)) {
                db.createObjectStore(DB_STORE, { keyPath: "id" });
            }
        };
    });
}

function dbOperation(mode, operation) {
    return new Promise((resolve, reject) => {
        if (!db) return reject("DB not init");
        const transaction = db.transaction(DB_STORE, mode);
        const store = transaction.objectStore(DB_STORE);
        const request = operation(store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

function saveChatsToDB() {
    const data = { id: "main_history", chats: CHATS };
    return dbOperation("readwrite", store => store.put(data));
}

function loadChatsFromDB() {
    return dbOperation("readonly", store => store.get("main_history")).then(data => {
        return data ? data.chats : [];
    }).catch(() => []);
}

// Soft Toast Logic
let countdownInterval = null;

function showQuotaToast() {
    const toast = document.getElementById('quota-toast');
    toast.classList.add('show');
    
    // Clear previous interval if exists
    if (countdownInterval) clearInterval(countdownInterval);
    
    updateCountdown(); // Run immediately
    countdownInterval = setInterval(updateCountdown, 1000);
}

function hideQuotaToast() {
    const toast = document.getElementById('quota-toast');
    toast.classList.remove('show');
    if (countdownInterval) clearInterval(countdownInterval);
}

function updateCountdown() {
    const now = new Date();
    // Calculate time until the NEXT full hour
    const nextHour = new Date(now);
    nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0); 
    
    const diff = nextHour - now;
    
    if (diff <= 0) {
        // Time has passed, refresh balance
        hideQuotaToast();
        updateBalance();
        return;
    }
    
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    const str = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    document.getElementById('toast-countdown').innerText = str;
}
